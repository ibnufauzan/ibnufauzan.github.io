<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>    

    <button onclick="typeWriter()">Click This</button>

    <p id="demo"></p>

    <script>
        var i = 0;
        var txt = 'Selamat ulang tahun Fadhila Syahda Nissa ke-19. Semoga panjang umur, sehat selalu, murah rezeki, dan diterima semua doa doanya oleh Allah SWT.';
        var speed = 100;

        function typeWriter() {
            if (i < txt.length) {
            
                document.getElementById("demo").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }
    </script>

    <audio controls outplay>
        <source src="audio/audio.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
